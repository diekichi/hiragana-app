<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひらがな れんしゅう</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div id="chrome-notice" class="chrome-notice">
    &#9888; このアプリは <strong>Chrome</strong> で開いてください（音声認識が使えます）
  </div>

  <!-- ホーム画面 -->
  <div id="screen-home" class="screen active">
    <h1 class="title">ひらがな れんしゅう</h1>
    <div id="hiragana-progress" class="progress-label"></div>
    <div id="hiragana-map" class="kana-map"></div>
    <div class="home-section-label">ひらがな</div>
    <div class="home-buttons">
      <button class="btn btn-quiz" onclick="startHiraganaReview()">かくにんモード</button>
      <button class="btn btn-practice" onclick="startHiraganaPractice()">れんしゅうモード</button>
    </div>
    <h1 class="title" style="margin-top: 80px;">カタカナ れんしゅう</h1>
    <div id="katakana-progress" class="progress-label"></div>
    <div id="katakana-map" class="kana-map"></div>
    <div class="home-section-label">カタカナ</div>
    <div class="home-buttons">
      <button class="btn btn-quiz" onclick="startKatakanaReview()">かくにんモード</button>
      <button class="btn btn-practice" onclick="startKatakanaPractice()">れんしゅうモード</button>
    </div>
    <div style="text-align:center; padding: 40px 0 20px;">
      <button class="btn btn-setup" onclick="showQRCode()">📱 タブレット用セットアップ</button>
    </div>
  </div>

  <!-- クイズ・練習・確認 共通画面 -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <button class="btn-back" onclick="goHome()">&#8592; もどる</button>
      <div id="mode-label" class="mode-label"></div>
      <div id="batch-progress" class="batch-progress"></div>
    </div>

    <div id="kana-display" class="kana-display"></div>
    <div id="streak-dots" class="streak-dots"></div>

    <div id="mic-area" class="mic-area">
      <button id="mic-btn" class="mic-btn" onclick="startListening()">
        <span class="mic-icon">&#127908;</span>
        <span class="mic-text">おして こたえる</span>
      </button>
      <div id="listening-msg" class="listening-msg hidden">きいてるよ...</div>
    </div>

    <div id="choices-area" class="choices-area hidden"></div>

    <div id="result-area" class="result-area hidden">
      <div id="result-text" class="result-text"></div>
      <button class="btn btn-next" onclick="nextQuestion()">つぎへ &#8594;</button>
    </div>
  </div>

  <!-- 確認モード完了・全完了 画面 -->
  <div id="screen-complete" class="screen">
    <div id="complete-message" class="complete-message"></div>
    <button class="btn btn-home" onclick="goHome()">ホームへ もどる</button>
  </div>

  <!-- QRコードオーバーレイ -->
  <div id="qr-overlay" class="key-overlay hidden">
    <div class="key-box">
      <p class="key-title">タブレットでこのQRコードを読み取ってください</p>
      <p class="key-hint">読み取るとアプリが自動で使えるようになります</p>
      <div id="qr-container" style="margin: 0 auto; width: fit-content;"></div>
      <button class="btn btn-quiz" onclick="hideQRCode()">閉じる</button>
    </div>
  </div>

  <!-- APIキー入力オーバーレイ -->
  <div id="key-overlay" class="key-overlay hidden">
    <div class="key-box">
      <p class="key-title">Groq APIキーを入力してください</p>
      <p class="key-hint">（一度入力すればこの端末では次回から不要です）</p>
      <input id="key-input" class="key-input" type="text" placeholder="gsk_..." />
      <button class="btn btn-practice" onclick="saveApiKey()">保存する</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
